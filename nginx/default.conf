upstream backend_cluster {
    least_conn;
    server 172.19.181.1:3001 max_fails=2 fail_timeout=60s;
    server 172.19.181.2:3001 max_fails=2 fail_timeout=60s;
    server 172.19.181.3:3001 max_fails=2 fail_timeout=60s;
    server 172.19.181.4:3001 max_fails=2 fail_timeout=60s;
    server backend:3000 backup;
    keepalive 8;
}

server {
    listen 80;
    server_name mealplanner;
    root /usr/share/nginx/html;

    # Security headers - Enhanced for production security
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter in browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features and APIs
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Content Security Policy - Prevents XSS and injection attacks
    # Production-hardened: removed 'unsafe-eval', tightened connect-src
    # Note: 'unsafe-inline' still required for React runtime styles
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    # HSTS - Force HTTPS for 1 year (only applies when served over HTTPS)
    # Safe for mixed HTTP/HTTPS deployments - browsers ignore on HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Remove server version information
    server_tokens off;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static image files - Enhanced caching for P1 Issue #167
    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;

        # Enable gzip for SVG images
        gzip_static on;
    }

    # Static assets with versioned filenames (hashed)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;

        # Enable gzip
        gzip_static on;
    }

    # Glances monitoring dashboard — proxied from :61208 with --url-prefix /monitoring
    location = /monitoring {
        return 301 /monitoring/;
    }
    location /monitoring/ {
        proxy_pass http://127.0.0.1:61208/monitoring/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
        access_log off;
    }

    # API routes - load balanced across Zero W cluster with Pi 4B fallback
    location /api/ {
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;

        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Serve pre-built React PWA static files directly (no frontend container on Pi)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name ride;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}

