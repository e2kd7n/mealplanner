<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="forkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fork handle -->
  <rect x="42" y="50" width="16" height="45" rx="3" fill="url(#forkGradient)"/>
  
  <!-- Fork prongs -->
  <rect x="30" y="5" width="8" height="50" rx="2" fill="url(#forkGradient)"/>
  <rect x="46" y="5" width="8" height="50" rx="2" fill="url(#forkGradient)"/>
  <rect x="62" y="5" width="8" height="50" rx="2" fill="url(#forkGradient)"/>
  
  <!-- Fork base connecting prongs to handle -->
  <rect x="28" y="48" width="44" height="8" rx="2" fill="url(#forkGradient)"/>
</svg>

