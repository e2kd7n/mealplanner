version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: meals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meal_planner
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      meals-network:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner -d meal_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_API_URL: /api
    image: meals-backend:latest
    container_name: meals-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:3000"
      - "8443:443"
    environment:
      NODE_ENV: production
      PORT: 3000
      HTTPS_PORT: 443
      HOST: 0.0.0.0
      USE_HTTPS: "false"
      SSL_KEY_PATH: /app/certs/key.pem
      SSL_CERT_PATH: /app/certs/cert.pem
      DATABASE_URL: postgresql://mealplanner:d8teYPprK7X%2B5N%2Fws05YlIzTu6c3pryezNuvtxyiKjQ%3D@postgres:5432/meal_planner?schema=public
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: meal_planner
      POSTGRES_USER: mealplanner
      CORS_ORIGIN: http://localhost:8080,http://raspberrypi.local:8080,https://localhost:8443,https://raspberrypi.local:8443
    secrets:
      - postgres_password
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/backups:/app/backups
      - ./data/images:/app/images
    networks:
      meals-network:
        aliases:
          - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  meals-network:
    driver: bridge

volumes:
  postgres_data: {}

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_secret:
    file: ./secrets/session_secret.txt

