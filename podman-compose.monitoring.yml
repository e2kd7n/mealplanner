version: '3.8'

# Monitoring overlay — add to any compose deployment:
#   podman-compose -f podman-compose.yml -f podman-compose.monitoring.yml up -d
#   podman-compose -f podman-compose.pi.yml -f podman-compose.monitoring.yml up -d
#
# RAM budget (Pi 4B): Prometheus ~50MB + Grafana ~80MB + AlertManager ~30MB = ~160MB.
# Optional: Loki ~50MB + Promtail ~30MB = ~240MB total (dev only recommended on Pi).
# Access: http://<host>:3001 (Prometheus), http://<host>:3002 (Grafana), http://<host>:3003 (AlertManager)
# Grafana default credentials: admin / admin  (change on first login)

services:
  prometheus:
    image: docker.io/prom/prometheus:v3.4.0
    container_name: meals-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "3001:9090"
    networks:
      meals-network:
        aliases:
          - prometheus
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.5'
        reservations:
          memory: 32M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: docker.io/grafana/grafana:12.0.1
    container_name: meals-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      meals-network:
        aliases:
          - grafana
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.5'
        reservations:
          memory: 48M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  alertmanager:
    image: docker.io/prom/alertmanager:v0.28.1
    container_name: meals-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "3003:9093"
    networks:
      meals-network:
        aliases:
          - alertmanager
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.25'
        reservations:
          memory: 16M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9093/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  loki:
    image: docker.io/grafana/loki:3.5.0
    container_name: meals-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3004:3100"
    networks:
      meals-network:
        aliases:
          - loki
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.5'
        reservations:
          memory: 32M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  promtail:
    image: docker.io/grafana/promtail:3.5.0
    container_name: meals-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - backend_logs:/var/log/backend:ro
    networks:
      meals-network:
        aliases:
          - promtail
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.25'
        reservations:
          memory: 16M
          cpus: '0.1'

volumes:
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
  backend_logs: {}

