# Docker Compose / Podman Compose Configuration
# This file is compatible with both docker-compose and podman-compose
# Usage: docker-compose up -d or podman-compose up -d
# IMPORTANT: Run ./scripts/generate-secrets.sh before first use
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meal-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: meal_planner
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner -d meal_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meal-planner-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: meal-planner-redis
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"'
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meal-planner-network

  # Backend API (will be built later)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meal-planner-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      # Secrets are mounted as files in /run/secrets/
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      SESSION_SECRET_FILE: /run/secrets/session_secret
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/uploads:/app/uploads
    secrets:
      - postgres_password
      - redis_password
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meal-planner-network
    profiles:
      - full  # Only start when 'full' profile is active

  # Frontend (will be built later)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meal-planner-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - meal-planner-network
    profiles:
      - full  # Only start when 'full' profile is active

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: meal-planner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/images:/usr/share/nginx/html/images:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - meal-planner-network
    profiles:
      - production  # Only start in production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  meal-planner-network:
    driver: bridge

# Docker Secrets Configuration
# Secrets are stored in ./secrets/ directory (excluded from git)
# Run ./scripts/generate-secrets.sh to create these files
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_secret:
    file: ./secrets/session_secret.txt

