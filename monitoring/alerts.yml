groups:
  - name: mealplanner-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(mealplanner_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(mealplanner_http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate (>5% 5xx responses)"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors."

      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(mealplanner_http_request_duration_seconds_bucket[5m])) by (le))
          > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response times (P95 > 2s)"
          description: "95th percentile response time is {{ $value | humanizeDuration }}."

      - alert: BackendDown
        expr: up{job="mealplanner-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Mealplanner backend is down"
          description: "Backend has been unreachable for more than 1 minute."

      - alert: HighMemoryUsage
        expr: |
          mealplanner_nodejs_heap_size_used_bytes
          /
          mealplanner_nodejs_heap_size_total_bytes
          > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Node.js heap usage (>85%)"
          description: "Heap is {{ $value | humanizePercentage }} full."

      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95, sum(rate(mealplanner_db_query_duration_seconds_bucket[5m])) by (le))
          > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries (P95 > 1s)"
          description: "95th percentile DB query duration is {{ $value | humanizeDuration }}."

      - alert: HighRequestRate
        expr: sum(rate(mealplanner_http_requests_total[1m])) > 100
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Unusually high request rate (>100 req/s)"
          description: "Request rate is {{ $value | humanize }} req/s."
