global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: mealplanner-backend
    static_configs:
      - targets:
          - backend:3000
    metrics_path: /metrics

  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
