name: E2E Tests

# Re-enabled after implementing P1 fixes:
# - Issue #137: API authentication
# - Issue #136: Session reuse pattern
# - Issue #139: Configurable authentication delays
# - Issue #138: Fixed sort dropdown selector
on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mealplanner
          POSTGRES_PASSWORD: mealplanner_password
          POSTGRES_DB: mealplanner
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://mealplanner:mealplanner_password@localhost:5432/mealplanner
        run: |
          pnpm prisma generate
          pnpm prisma migrate deploy
          pnpm run prisma:seed
          # Verify seed data was created
          echo "Verifying database seed..."
          echo "SELECT COUNT(*) as user_count FROM users; SELECT COUNT(*) as recipe_count FROM recipes;" | pnpm prisma db execute --stdin --url "$DATABASE_URL"

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgresql://mealplanner:mealplanner_password@localhost:5432/mealplanner
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci
          SESSION_SECRET: test-session-secret-for-ci
          NODE_ENV: test
          E2E_TESTING: true
          PORT: 3000
          CORS_ORIGIN: http://localhost:5173
        run: |
          pnpm dev > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend PID: $(cat backend.pid)"
          
          # Wait for backend to be ready with improved health check
          echo "Waiting for backend server..."
          for i in {1..30}; do
            if curl -f -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              curl -s http://localhost:3000/health | jq '.'
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start within 60 seconds"
              echo "=== Backend logs ==="
              cat backend.log
              exit 1
            fi
            echo "Attempt $i/30: Backend not ready yet..."
            sleep 2
          done

      - name: Start frontend server
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: |
          pnpm run dev > frontend.log 2>&1 &
          echo $! > frontend.pid
          echo "Frontend PID: $(cat frontend.pid)"
          
          # Wait for frontend to be ready
          echo "Waiting for frontend server..."
          for i in {1..30}; do
            if curl -f -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start within 60 seconds"
              echo "=== Frontend logs ==="
              cat frontend.log
              exit 1
            fi
            echo "Attempt $i/30: Frontend not ready yet..."
            sleep 2
          done

      - name: Create auth directory
        working-directory: frontend
        run: mkdir -p e2e/.auth

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install-deps chromium
          fi

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_TESTING: true
          BASE_URL: http://localhost:5173
        run: pnpm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: frontend/test-results/
          retention-days: 7

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            backend/backend.log
            frontend/frontend.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up processes..."
          if [ -f backend/backend.pid ]; then
            PID=$(cat backend/backend.pid)
            echo "Killing backend process $PID"
            kill $PID 2>/dev/null || true
            # Wait for graceful shutdown
            sleep 2
            # Force kill if still running
            kill -9 $PID 2>/dev/null || true
          fi
          if [ -f frontend/frontend.pid ]; then
            PID=$(cat frontend/frontend.pid)
            echo "Killing frontend process $PID"
            kill $PID 2>/dev/null || true
            sleep 2
            kill -9 $PID 2>/dev/null || true
          fi
          # Kill any remaining node processes on ports 3000 and 5173
          lsof -ti:3000 | xargs kill -9 2>/dev/null || true
          lsof -ti:5173 | xargs kill -9 2>/dev/null || true
          echo "Cleanup complete"

# Made with Bob
