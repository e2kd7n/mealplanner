version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        patterns: ['*']
        dependency-type: development
      prod-deps:
        patterns: ['*']
        dependency-type: production
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        patterns: ['*']
        dependency-type: development
      prod-deps:
        patterns: ['*']
        dependency-type: production
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 3
