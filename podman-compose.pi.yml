version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: meals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meal_planner
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
      # PostgreSQL tuning for 2GB RAM Pi (SD card - conservative WAL)
      POSTGRES_SHARED_BUFFERS: 64MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 256MB
      POSTGRES_MAINTENANCE_WORK_MEM: 48MB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 3MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 100
      POSTGRES_RANDOM_PAGE_COST: 1.1
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: 200
      POSTGRES_WORK_MEM: 3MB
      POSTGRES_MIN_WAL_SIZE: 128MB
      POSTGRES_MAX_WAL_SIZE: 1GB
      POSTGRES_MAX_CONNECTIONS: 15
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      meals-network:
        aliases:
          - postgres
    deploy:
      resources:
        limits:
          memory: 160M
          cpus: '1.0'
        reservations:
          memory: 100M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner -d meal_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: meals-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass $(cat /run/secrets/redis_password) --maxmemory 28mb --maxmemory-policy allkeys-lru"]
    secrets:
      - redis_password
    networks:
      meals-network:
        aliases:
          - redis
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.5'
        reservations:
          memory: 16M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $(cat /run/secrets/redis_password) ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: meals-backend:latest
    container_name: meals-backend
    platform: linux/arm64/v8
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HTTPS_PORT: 443
      HOST: 0.0.0.0
      USE_HTTPS: "false"
      SSL_KEY_PATH: /app/certs/key.pem
      SSL_CERT_PATH: /app/certs/cert.pem
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: meal_planner
      POSTGRES_USER: mealplanner
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:8080,http://raspberrypi.local:8080,https://localhost:8443,https://raspberrypi.local:8443
      NODE_OPTIONS: --max-old-space-size=256
    secrets:
      - postgres_password
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
      - redis_password
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/backups:/app/backups
      - ./data/images:/app/images
    networks:
      meals-network:
        aliases:
          - backend
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '1.5'
        reservations:
          memory: 200M
          cpus: '0.75'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: docker.io/library/nginx:alpine
    container_name: meals-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/frontend-dist:/usr/share/nginx/html:ro
      - ./data/images:/usr/share/nginx/html/images:ro
    networks:
      meals-network:
        aliases:
          - nginx
    deploy:
      resources:
        limits:
          memory: 48M
          cpus: '0.5'
        reservations:
          memory: 24M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  meals-network:
    driver: bridge

volumes:
  postgres_data: {}

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_secret:
    file: ./secrets/session_secret.txt
  redis_password:
    file: ./secrets/redis_password.txt

