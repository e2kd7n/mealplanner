version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: meals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meal_planner
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
      # PostgreSQL tuning for 1.8GB RAM Pi (optimized for minimal memory)
      POSTGRES_SHARED_BUFFERS: 96MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 256MB
      POSTGRES_MAINTENANCE_WORK_MEM: 48MB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 3MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 100
      POSTGRES_RANDOM_PAGE_COST: 1.1
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: 200
      POSTGRES_WORK_MEM: 3MB
      POSTGRES_MIN_WAL_SIZE: 512MB
      POSTGRES_MAX_WAL_SIZE: 1GB
      POSTGRES_MAX_CONNECTIONS: 15
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      meals-network:
        aliases:
          - postgres
    # Memory limits for Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '1.0'
        reservations:
          memory: 100M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner -d meal_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: meals-backend:latest
    container_name: meals-backend
    platform: linux/arm/v7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HTTPS_PORT: 443
      HOST: 0.0.0.0
      USE_HTTPS: "false"
      SSL_KEY_PATH: /app/certs/key.pem
      SSL_CERT_PATH: /app/certs/cert.pem
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: meal_planner
      POSTGRES_USER: mealplanner
      CORS_ORIGIN: http://localhost:8080,http://raspberrypi.local:8080,https://localhost:8443,https://raspberrypi.local:8443
      # Node.js memory optimization for Pi - aggressive limits
      NODE_OPTIONS: --max-old-space-size=256 --optimize-for-size --gc-interval=100
    secrets:
      - postgres_password
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/backups:/app/backups
      - ./data/images:/app/images
    networks:
      meals-network:
        aliases:
          - backend
    # Memory limits for Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '1.5'
        reservations:
          memory: 200M
          cpus: '0.75'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: meals-frontend:latest
    container_name: meals-frontend
    platform: linux/arm/v7
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      meals-network:
        aliases:
          - frontend
    # Memory limits for Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: '0.5'
        reservations:
          memory: 50M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: docker.io/library/nginx:alpine
    container_name: meals-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/images:/usr/share/nginx/html/images:ro
    networks:
      meals-network:
        aliases:
          - nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  meals-network:
    driver: bridge

volumes:
  postgres_data: {}

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  session_secret:
    file: ./secrets/session_secret.txt

